name: Build macOS ARM64

on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release binary (aarch64-apple-darwin)
    runs-on: blacksmith-6vcpu-macos-15

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web bundle
        working-directory: web
        run: npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Stage release asset
        run: cp target/aarch64-apple-darwin/release/peckboard peckboard-macos-arm64

      - name: Checksum
        run: shasum -a 256 peckboard-macos-arm64 > peckboard-macos-arm64.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: peckboard-macos-arm64
          path: peckboard-macos-arm64
          if-no-files-found: error

      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            peckboard-macos-arm64
            peckboard-macos-arm64.sha256
