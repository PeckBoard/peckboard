name: Build Windows x86_64

on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release binary (x86_64-pc-windows-msvc)
    runs-on: [self-hosted, Windows, X64]

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web bundle
        working-directory: web
        run: npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage release asset
        run: Copy-Item target/x86_64-pc-windows-msvc/release/peckboard.exe peckboard-windows-x86_64.exe

      - name: Checksum
        run: "(Get-FileHash peckboard-windows-x86_64.exe -Algorithm SHA256).Hash.ToLower() + '  peckboard-windows-x86_64.exe' | Out-File -Encoding ascii -NoNewline peckboard-windows-x86_64.exe.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: peckboard-windows-x86_64
          path: peckboard-windows-x86_64.exe
          if-no-files-found: error

      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            peckboard-windows-x86_64.exe
            peckboard-windows-x86_64.exe.sha256
